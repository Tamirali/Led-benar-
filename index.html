<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamir Ali LED Pro - 7 Colors</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* ऊपर का LED डिस्प्ले */
        .led-screen {
            background: #000;
            border: 4px solid #333;
            height: 160px;
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
            border-radius: 12px;
            box-shadow: 0 0 25px #ff5722;
            margin-bottom: 20px;
        }

        #scrollWrapper {
            display: inline-block;
            white-space: nowrap;
            position: absolute;
            animation: moveRightToLeft 10s linear infinite;
        }

        #mainText {
            font-size: 60px;
            font-weight: bold;
            padding: 0 50px;
            text-shadow: 0 0 20px currentColor;
            color: #ff5722;
        }

        /* Right to Left Animation */
        @keyframes moveRightToLeft {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        /* 🌈 7 रंगों वाला जादू (Rainbow) */
        .rainbow-effect { animation: rainbow7 3s linear infinite !important; }
        @keyframes rainbow7 {
            0% { color: #8B00FF; } 14% { color: #4B0082; } 28% { color: #0000FF; }
            42% { color: #00FF00; } 57% { color: #FFFF00; } 71% { color: #FF7F00; }
            85% { color: #FF0000; } 100% { color: #8B00FF; }
        }

        /* अन्य इफेक्ट्स */
        .zoom-effect { animation: zoomer 1s ease-in-out infinite alternate; }
        @keyframes zoomer { from { transform: scale(0.7); } to { transform: scale(1.1); } }

        .wave-effect { animation: waver 0.8s ease-in-out infinite alternate; }
        @keyframes waver { from { transform: translateY(-30px); } to { transform: translateY(30px); } }

        /* कंट्रोल पैनल (डार्क थीम) */
        .panel { background: #111; padding: 20px; border-radius: 15px; text-align: left; border: 1px solid #333; }
        .label-text { font-size: 14px; color: #ff5722; font-weight: bold; margin: 10px 0 5px 0; display: block; }
        
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: none; background: #222; color: #fff; font-size: 16px; box-sizing: border-box; }

        /* 7 कलर बटन्स ग्रिड */
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .c-btn { height: 45px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px #000; }
        
        .rainbow-btn { 
            grid-column: span 4; 
            background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet); 
            height: 50px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 5px; 
        }

        .update-btn { background: #ff5722; color: #fff; border: none; padding: 18px; width: 100%; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; box-shadow: 0 4px #000; }
    </style>
</head>
<body>

    <h3 style="color: #ff5722; margin-bottom: 10px;">🚩 तामीर अली LED कंट्रोल प्रो</h3>

    <div class="led-screen" id="board">
        <div id="scrollWrapper">
            <div id="mainText">स्वागत है!</div>
        </div>
    </div>

    <div class="panel">
        <span class="label-text">बैनर पर क्या लिखें?</span>
        <input type="text" id="textInp" placeholder="अपना नाम लिखें..." oninput="syncText()">

        <span class="label-text">7 रंग चुनें (Click Button):</span>
        <div class="color-grid">
            <button class="c-btn" style="background: #FF0000;" onclick="applyColor('#FF0000')">लाल</button>
            <button class="c-btn" style="background: #00FF00; color:#000;" onclick="applyColor('#00FF00')">हरा</button>
            <button class="c-btn" style="background: #0000FF;" onclick="applyColor('#0000FF')">नीला</button>
            <button class="c-btn" style="background: #FFFF00; color:#000;" onclick="applyColor('#FFFF00')">पीला</button>
            <button class="c-btn" style="background: #FF7F00;" onclick="applyColor('#FF7F00')">नारंगी</button>
            <button class="c-btn" style="background: #8B00FF;" onclick="applyColor('#8B00FF')">बैंगनी</button>
            <button class="c-btn" style="background: #00FFFF; color:#000;" onclick="applyColor('#00FFFF')">आसमानी</button>
            <button class="c-btn" style="background: #FFFFFF; color:#000;" onclick="applyColor('#FFFFFF')">सफ़ेद</button>
            
            <button class="rainbow-btn" onclick="applyRainbow()">🌈 7-कलर जादुई मोड (Rainbow)</button>
        </div>

        <span class="label-text">एनिमेशन इफेक्ट चुनें:</span>
        <select id="effSel">
            <option value="none">सिर्फ चलना (Plain Scroll)</option>
            <option value="zoom-effect">छोटा-बड़ा होना (Zoom)</option>
            <option value="wave-effect">लहराना (Wave Effect)</option>
        </select>

        <span class="label-text">रफ्तार (Speed):</span>
        <select id="spdSel">
            <option value="15s">Slow (धीमी)</option>
            <option value="8s" selected>Normal (सामान्य)</option>
            <option value="4s">Fast (तेज़)</option>
        </select>

        <button class="update-btn" onclick="refreshBanner()">बैनर अपडेट करें ▶️</button>
    </div>

    <script>
        function syncText() {
            const val = document.getElementById('textInp').value;
            document.getElementById('mainText').innerText = val || "तामीर अली";
        }

        function applyColor(clr) {
            const t = document.getElementById('mainText');
            t.classList.remove('rainbow-effect');
            t.style.color = clr;
            document.getElementById('board').style.boxShadow = `0 0 25px ${clr}`;
        }

        function applyRainbow() {
            document.getElementById('mainText').classList.add('rainbow-effect');
            document.getElementById('board').style.boxShadow = `0 0 25px cyan`;
        }

        function refreshBanner() {
            const speed = document.getElementById('spdSel').value;
            const effect = document.getElementById('effSel').value;
            const wrapper = document.getElementById('scrollWrapper');
            const text = document.getElementById('mainText');

            wrapper.style.animation = 'none';
            text.classList.remove('zoom-effect', 'wave-effect'); 
            
            setTimeout(() => {
                if(effect !== "none") text.classList.add(effect);
                wrapper.style.animation = `moveRightToLeft ${speed} linear infinite`;
            }, 50);
        }
    </script>

</body>
</html>
